
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module05: classes, ids</title>

    <style>
        body {
            background-color: black;
            color: beige;
            font-family: Georgia, 'Times New Roman', Times, serif;
            margin: 0;
            padding: 0;
        }
        #page-wrapper{
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 24px;

        }
        .band-photos{
            width: 300px;
            height: 300px;
            object-fit: cover;
        }
        #photos{
            background-color: antiquewhite;
        }
        #listen-section{
            position:relative;
            display:flex;
            justify-content: center;
            align-content: center;
            width: 500px;
            height: 500px;
            background-color: bisque;
        }
    </style>
</head>
<body>
    <!--
        id: unique, only one element in a page should have it

        class: reusable. used to identify multiple elements together
     -->
     <div id="page-wrapper">
        <h1>The neighbourhood</h1>
        <p>Disc: Band from the roots of California, stellar music</p>

        <div class="photos">

        <img class="band-photos" src="./assets/images/the nbhd.png" alt="band photo">
        <img class="band-photos" src="./assets/images/the nbhd.png" alt="band photo">
    </div>

    <div id="listen-section"> 
      <p class="song">Latest song</p>
      <p class="song">Earlier song</p>
    </div>
     </div>   
</body>
</html>
